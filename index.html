    <script>
    const formatarDT = (dataEntrada) => {
        if (!dataEntrada) return "";
        let d;
        if (typeof dataEntrada === 'string' && (dataEntrada.includes('T') || !isNaN(Date.parse(dataEntrada)))) {
            d = new Date(dataEntrada);
        } else if (dataEntrada instanceof Date) {
            d = dataEntrada;
        } else {
            const partes = String(dataEntrada).match(/\d+/g);
            if (partes && partes.length >= 5) {
                return `${partes[0].padStart(2,'0')}/${partes[1].padStart(2,'0')}/${partes[2]} ${partes[3].padStart(2,'0')}:${partes[4].padStart(2,'0')}`;
            }
            return String(dataEntrada);
        }
        const pad = (n) => n.toString().padStart(2,'0');
        return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    };

    const LOGO_INFRA_BASE64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGQAAAAtCAYAAAC93T7mAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAALJSURBVHgB7VpNTsMwEB6p9Ar9C8SOf8IBmAsS90C4S9wB4pI79A69AydALkhsh8SOf8IBmAsS90C4S9wB4pI79A69AydALkhsh9SOf8IBmAsS90C4S9wB4pI79A69AydALkhsh9SOf8IBmAsS90C4S9wB4pI79A69AydALkhsh9SOf8IBmAsS90C4S9wB4pI79A69AydALkhsh9SOf8IBmAsS90C4S9wB4pI79A69AydALkhsh9SOf8IBmAsS90C4S9wB4pI79A69AydALkhsh9SOf8IBmAsS90C4S9wB4pI79A69AydALkhsh9SOf8IBmAsS90C4S9wB4pI79A69AydALkhsh9SOf8IBmAsS90C4S9wB4pI79A69AydALkhsh9SOf8IBmAsS90C4S9wB4pI79A69AydALkhsh9SOf8IBmAsS90C4S9wB4pI79A69AydALkhsh9SOf8IBmAsS90C4S9wB4pI79A69AydALkhsh/T/8wdWAnw7ZIdr7AAAAABJRU5ErkJggg==";

    // ─────────────────────────────────────────────
    // STORAGE SERVICE — agora usando Firestore
    // ─────────────────────────────────────────────
    const StorageService = {
        _db: null,
        _lib: null,

        init(firestoreDb, lib) {
            this._db = firestoreDb;
            this._lib = lib;
        },

        // ── DEMANDAS ──────────────────────────────
        async getData() {
            const { collection, getDocs } = this._lib;
            const snap = await getDocs(collection(this._db, 'demandas'));
            const items = [];
            snap.forEach(d => items.push(d.data()));
            return items;
        },

        async setData(data) {
            // Salva cada demanda como um documento individual (id = item.id)
            const { doc, setDoc, collection, getDocs, deleteDoc } = this._lib;

            // Remove documentos que não existem mais
            const snap = await getDocs(collection(this._db, 'demandas'));
            const idsAtuais = new Set(data.map(i => String(i.id)));
            for (const d of snap.docs) {
                if (!idsAtuais.has(d.id)) await deleteDoc(d.ref);
            }

            // Upsert de cada item
            for (const item of data) {
                await setDoc(doc(this._db, 'demandas', String(item.id)), item);
            }
        },

        // ── CONFIGURAÇÃO ─────────────────────────
        async getConfig() {
            const { doc, getDoc } = this._lib;
            const snap = await getDoc(doc(this._db, 'config', 'main'));
            if (snap.exists()) return snap.data();
            return {
                subtitulo: "GEPEM", semana: "Semana 13", periodo: "22/03 a 27/03/2026",
                userName: "Ezequiel G. Ferreira", userRole: "Gestor Substituto",
                userImg: "https://i.imgur.com/8K9pY7u.png", tituloComp: "GEPEM/SUINM/DIMEI-INFRASA"
            };
        },

        async setConfig(config) {
            const { doc, setDoc } = this._lib;
            await setDoc(doc(this._db, 'config', 'main'), config);
        },

        // ── LOGS ─────────────────────────────────
        async getLogs(id) {
            const { doc, getDoc } = this._lib;
            const snap = await getDoc(doc(this._db, 'logs', String(id)));
            if (snap.exists()) return snap.data().entries || [];
            return [];
        },

        async setLogs(id, logs) {
            const { doc, setDoc } = this._lib;
            await setDoc(doc(this._db, 'logs', String(id)), { entries: logs });
        },

        async deleteLogs(id) {
            const { doc, deleteDoc } = this._lib;
            await deleteDoc(doc(this._db, 'logs', String(id)));
        }
    };

    // ─────────────────────────────────────────────
    // SYNC STATUS BADGE
    // ─────────────────────────────────────────────
    const SyncUI = {
        _timer: null,
        show(msg, state = 'ok') {
            const el = document.getElementById('sync-status');
            const dot = document.getElementById('sync-dot');
            const txt = document.getElementById('sync-msg');
            dot.className = state === 'syncing' ? 'syncing' : state === 'error' ? 'error' : '';
            txt.textContent = msg;
            el.classList.add('visible');
            clearTimeout(this._timer);
            if (state === 'ok') this._timer = setTimeout(() => el.classList.remove('visible'), 2500);
        }
    };

    // ─────────────────────────────────────────────
    // APP ENGINE
    // ─────────────────────────────────────────────
    const AppEngine = {
        db: [],
        config: {},
        itemAtivoId: null,

        async init() {
            this.config = await StorageService.getConfig();
            this.db = await StorageService.getData();
            this.aplicarConfig();
            RenderEngine.renderListas();
            lucide.createIcons();
            document.getElementById('loading-screen').style.display = 'none';
            SyncUI.show('Conectado ao Firebase', 'ok');
        },

        aplicarConfig() {
            document.getElementById('display-subtitulo').innerText = this.config.subtitulo || '';
            document.getElementById('display-semana').innerText = this.config.semana || '';
            document.getElementById('display-periodo').innerText = this.config.periodo || '';
            document.getElementById('user-name-sidebar').innerText = this.config.userName || '';
            document.getElementById('user-role-sidebar').innerText = this.config.userRole || '';
            document.getElementById('user-img-sidebar').src = this.config.userImg || '';
        },

        async salvarConfig() {
            const modals = {
                'modal-user': () => { this.config.userName = document.getElementById('input-username').value; this.config.userRole = document.getElementById('input-userrole').value; },
                'modal-gestao': () => { this.config.subtitulo = document.getElementById('input-subtitulo').value; this.config.semana = document.getElementById('input-semana').value; this.config.periodo = document.getElementById('input-periodo').value; },
                'modal-titulo': () => { this.config.tituloComp = document.getElementById('input-titulo-comp').value; }
            };
            Object.keys(modals).forEach(id => { if (!document.getElementById(id).classList.contains('hidden')) modals[id](); });
            SyncUI.show('Salvando...', 'syncing');
            await StorageService.setConfig(this.config);
            this.aplicarConfig();
            Navigation.fecharModais();
            SyncUI.show('Configuração salva', 'ok');
        },

        async adicionarNovaDemanda() {
            const novaId = Date.now().toString();
            const nova = { id: novaId, nome: 'NOVA DEMANDA', dataReg: formatarDT(new Date().toISOString()), status: 'pendente', grupo: 'ativa', processo: '', passos: [], imprimirItem: true };
            this.db.push(nova);
            SyncUI.show('Salvando...', 'syncing');
            await StorageService.setData(this.db);
            RenderEngine.renderListas();
            RenderEngine.abrirDetalhes(novaId);
            SyncUI.show('Demanda criada', 'ok');
        },

        async salvarAlteracoesPagina() {
            if (!this.itemAtivoId) return;
            const item = this.db.find(i => i.id === this.itemAtivoId);
            item.nome = document.getElementById('edit-nome').innerText;
            item.status = document.getElementById('edit-status').value;
            item.processo = document.getElementById('edit-processo').innerText;
            RenderEngine.renderListas();
            SyncUI.show('Salvando...', 'syncing');
            StorageService.setData(this.db)
                .then(() => SyncUI.show('Salvo', 'ok'))
                .catch(() => SyncUI.show('Erro ao salvar', 'error'));
            const btn = document.getElementById('btn-salvar-geral');
            btn.innerText = '✔ SALVO';
            setTimeout(() => { btn.innerHTML = '<i data-lucide="save" class="w-4 h-4"></i><span><u>S</u>ALVAR ALTERAÇÕES</span>'; lucide.createIcons(); }, 2000);
        },

        async lancarLog(id) {
            const input = document.getElementById('log-input');
            const texto = input.innerText.trim();
            if (!texto) return;
            const logs = await StorageService.getLogs(id);
            logs.push({ data: new Date().toISOString(), texto: texto, imprimir: true });
            SyncUI.show('Salvando log...', 'syncing');
            await StorageService.setLogs(id, logs);
            input.innerText = '';
            RenderEngine.toggleLogArea();
            await RenderEngine.updateLogUI(id);
            SyncUI.show('Log adicionado', 'ok');
        },

        exportarBackup() {
            const b = { db: this.db, logs: {} };
            // Para exportar, usa os logs já carregados na UI (leitura assíncrona já foi feita)
            Promise.all(this.db.map(async i => {
                b.logs[i.id] = await StorageService.getLogs(i.id);
            })).then(() => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([JSON.stringify(b, null, 2)], { type: "application/json" }));
                a.download = `BACKUP_SGD.json`;
                a.click();
            });
        },

        async importarBackup(e) {
            const reader = new FileReader();
            reader.onload = async ev => {
                const data = JSON.parse(ev.target.result);
                this.db = data.db;
                SyncUI.show('Importando...', 'syncing');
                await StorageService.setData(this.db);
                for (const k of Object.keys(data.logs)) {
                    await StorageService.setLogs(k, data.logs[k]);
                }
                SyncUI.show('Importado com sucesso', 'ok');
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        },

        alterarFoto(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async ev => {
                    this.config.userImg = ev.target.result;
                    document.getElementById('user-img-sidebar').src = ev.target.result;
                    await StorageService.setConfig(this.config);
                };
                reader.readAsDataURL(file);
            }
        }
    };

    // ─────────────────────────────────────────────
    // NAVIGATION
    // ─────────────────────────────────────────────
    const Navigation = {
        toggleSidebar() { document.getElementById('sidebar-infra').classList.toggle('collapsed'); lucide.createIcons(); },
        toggleSubmenu(id) {
            const s = document.getElementById('sidebar-infra'); if (s.classList.contains('collapsed')) s.classList.remove('collapsed');
            document.getElementById(id).classList.toggle('open'); lucide.createIcons();
        },
        toggleModal(id) {
            const m = document.getElementById(id);
            if (m.classList.contains('hidden')) {
                if (id === 'modal-user') { document.getElementById('input-username').value = AppEngine.config.userName; document.getElementById('input-userrole').value = AppEngine.config.userRole; }
                if (id === 'modal-gestao') { document.getElementById('input-subtitulo').value = AppEngine.config.subtitulo; document.getElementById('input-semana').value = AppEngine.config.semana; document.getElementById('input-periodo').value = AppEngine.config.periodo; }
                if (id === 'modal-titulo') { document.getElementById('prefixo-titulo').innerText = `RELATÓRIO SEMANAL Nº ${AppEngine.config.semana.replace(/\D/g,"")}/2026/`; document.getElementById('input-titulo-comp').value = AppEngine.config.tituloComp; }
            }
            m.classList.toggle('hidden');
        },
        fecharModais() { document.querySelectorAll('[id^="modal-"]').forEach(m => m.classList.add('hidden')); },
        voltarParaApp() {
            document.getElementById('report-toolbar').style.display = 'none';
            document.getElementById('topo-app').classList.remove('hidden');
            document.getElementById('sidebar-listas').classList.remove('hidden');
            if (AppEngine.itemAtivoId) RenderEngine.abrirDetalhes(AppEngine.itemAtivoId);
        }
    };

    // ─────────────────────────────────────────────
    // RENDER ENGINE
    // ─────────────────────────────────────────────
    const RenderEngine = {
        renderListas() {
            const busca = document.getElementById('busca-rapida').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            const ordem = document.getElementById('sort-order').value;
            this._renderSecao('ativa', 'lista-ativa', busca, status, ordem);
            this._renderSecao('especial', 'lista-especial', busca, status, ordem);
            document.getElementById('count-ativas').innerText = `${AppEngine.db.filter(i => (i.grupo||'ativa') === 'ativa').length}/${AppEngine.db.length}`;
            document.getElementById('count-especial').innerText = `${AppEngine.db.filter(i => i.grupo === 'especial').length}/${AppEngine.db.length}`;
            lucide.createIcons();
        },

        _renderSecao(grupo, containerId, busca, filtro, ordem) {
            const container = document.getElementById(containerId); container.innerHTML = '';
            let items = AppEngine.db.filter(i => (i.grupo || 'ativa') === grupo);
            if (busca) items = items.filter(i => i.nome.toLowerCase().includes(busca));
            if (filtro !== 'todos') items = items.filter(i => i.status === filtro);
            items.sort((a, b) => ordem === 'asc' ? a.nome.localeCompare(b.nome) : b.nome.localeCompare(a.nome));
            items.forEach(p => {
                const dotColor = p.status === 'urgente' ? 'bg-red-500' :
                                 p.status === 'pendente' ? 'bg-yellow-400' :
                                 p.status === 'andamento' ? 'bg-blue-500' :
                                 p.status === 'aguardando' ? 'bg-white border border-slate-300' :
                                 p.status === 'concluido' ? 'bg-emerald-500' : 'bg-slate-300';
                const div = document.createElement('div');
                div.className = `p-4 border-b flex justify-between items-center cursor-pointer hover:bg-slate-50 item-sidebar-container ${AppEngine.itemAtivoId === p.id ? 'item-active' : ''}`;
                div.setAttribute('data-id', p.id); div.onclick = () => this.abrirDetalhes(p.id);
                div.innerHTML = `<div class="flex items-center gap-2"><div class="handle text-slate-300"><i data-lucide="grip-vertical" class="w-3 h-3"></i></div><div class="text-[11px] uppercase text-slate-700">${p.nome}</div></div><div class="flex items-center gap-3"><button onclick="event.stopPropagation(); RenderEngine.toggleImp('${p.id}')" class="print-indicator ${p.imprimirItem === false ? 'print-active' : ''}"><i data-lucide="${p.imprimirItem === false ? 'file-x-2' : 'file-text'}" class="w-4 h-4"></i></button><span class="w-2.5 h-2.5 rounded-full ${dotColor}"></span></div>`;
                container.appendChild(div);
            });
            Sortable.create(container, { group: 'sidebar', animation: 150, handle: '.handle', onEnd: async (e) => {
                const item = AppEngine.db.find(i => i.id === e.item.getAttribute('data-id'));
                if (item) {
                    item.grupo = e.to.id === 'lista-especial' ? 'especial' : 'ativa';
                    SyncUI.show('Salvando ordem...', 'syncing');
                    await StorageService.setData(AppEngine.db);
                    SyncUI.show('Ordem salva', 'ok');
                    setTimeout(() => this.renderListas(), 50);
                }
            }});
        },

        async abrirDetalhes(id) {
            AppEngine.itemAtivoId = id;
            const p = AppEngine.db.find(i => i.id === id);
            this.renderListas();
            const painel = document.getElementById('painel-rolagem');
            document.getElementById('btn-salvar-geral').classList.remove('hidden');
            painel.innerHTML = `<div class="max-w-5xl mx-auto"><div class="flex justify-between items-start mb-6 border-b pb-6"><div><h2 contenteditable="true" id="edit-nome" class="text-3xl font-normal text-slate-800 outline-none uppercase">${p.nome}</h2><p class="text-[10px] text-slate-400 font-normal uppercase mt-2">CRIADO EM ${p.dataReg}</p></div><div class="flex gap-2"><select id="edit-status" onchange="AppEngine.salvarAlteracoesPagina()" class="p-2 border rounded font-normal text-[10px] bg-white"><option value="urgente" ${p.status==='urgente'?'selected':''}>🔴 URGENTE</option><option value="pendente" ${p.status==='pendente'?'selected':''}>🟡 PENDENTE</option><option value="andamento" ${p.status==='andamento'?'selected':''}>🔵 ANDAMENTO</option><option value="aguardando" ${p.status==='aguardando'?'selected':''}>⚪ AGUARDANDO</option><option value="concluido" ${p.status==='concluido'?'selected':''}>🟢 CONCLUÍDO</option></select><button onclick="RenderEngine.excluirDemanda('${id}')" class="p-2 border rounded text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div><div class="secao-card"><div class="secao-header"><span>Contexto</span></div><div contenteditable="true" id="edit-processo" class="textarea-processo text-sm">${p.processo || ''}</div></div><div class="secao-card"><div class="secao-header"><span>Histórico</span><button onclick="RenderEngine.toggleLogArea()" class="btn-add-mini"><i data-lucide="plus" class="w-4 h-4"></i></button></div><div id="logs-container" class="p-4 space-y-3"></div><div id="input-log-area" class="hidden p-4 border-t bg-white"><div contenteditable="true" id="log-input" class="w-full p-4 border rounded outline-none text-sm min-h-[80px]"></div><div class="flex justify-end mt-3"><button onclick="AppEngine.lancarLog('${id}')" class="bg-emerald-600 text-white px-4 py-2 rounded text-[10px] font-black uppercase">Adicionar</button></div></div></div><div class="secao-card"><div class="secao-header"><span>Pendências</span><button onclick="RenderEngine.togglePendenciaArea()" class="btn-add-mini"><i data-lucide="plus" class="w-4 h-4"></i></button></div><div class="p-4"><ul id="prioridades-sort" class="space-y-2">${p.passos.map((s, i) => `<li class="flex items-center gap-3 bg-white p-3 rounded border group"><div class="handle text-slate-300"><i data-lucide="grip-vertical" class="w-4 h-4"></i></div><div contenteditable="true" onblur="RenderEngine.editP('${id}',${i},this.innerText)" class="flex-1 text-sm outline-none" style="white-space: pre-wrap; word-break: break-word;">${s}</div><button onclick="RenderEngine.remP('${id}',${i})" class="text-red-300 opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button></li>`).join('')}</ul></div><div id="input-pendencia-area" class="hidden p-4 border-t bg-white"><div contenteditable="true" id="pendencia-input" class="w-full p-4 border rounded outline-none text-sm min-h-[60px]"></div><div class="flex justify-end mt-3"><button onclick="RenderEngine.addP('${id}')" class="bg-emerald-600 text-white px-4 py-2 rounded text-[10px] font-black uppercase">Adicionar</button></div></div></div></div>`;
            await this.updateLogUI(id);
            Sortable.create(document.getElementById('prioridades-sort'), { animation: 150, handle: '.handle', onEnd: async () => {
                p.passos = Array.from(document.querySelectorAll('#prioridades-sort [contenteditable]')).map(el => el.innerText);
                SyncUI.show('Salvando...', 'syncing');
                await StorageService.setData(AppEngine.db);
                SyncUI.show('Salvo', 'ok');
            }});
            lucide.createIcons();
        },

        async updateLogUI(id) {
            const logs = await StorageService.getLogs(id);
            document.getElementById('logs-container').innerHTML = [...logs].reverse().map((l, i) => {
                const idx = logs.length - 1 - i;
                return `<div class="flex items-start gap-4 p-3 bg-white border rounded group ${l.imprimir?'':'opacity-40'}"><span class="text-[10px] text-emerald-600 shrink-0 mt-1">${formatarDT(l.data)}</span><div contenteditable="true" onblur="RenderEngine.edL('${id}',${idx},this.innerText)" class="flex-1 text-sm outline-none">${l.texto}</div><div class="flex gap-2 mt-1"><button onclick="RenderEngine.togL('${id}',${idx})" class="text-slate-300"><i data-lucide="${l.imprimir?'file-text':'file-x-2'}" class="w-4 h-4"></i></button><button onclick="RenderEngine.exL('${id}',${idx})" class="text-red-200 opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`;
            }).join('');
            lucide.createIcons();
        },

        toggleLogArea() { const a = document.getElementById('input-log-area'); a.classList.toggle('hidden'); if(!a.classList.contains('hidden')) document.getElementById('log-input').focus(); },
        togglePendenciaArea() { const a = document.getElementById('input-pendencia-area'); a.classList.toggle('hidden'); if(!a.classList.contains('hidden')) document.getElementById('pendencia-input').focus(); },

        async toggleImp(id) {
            let p = AppEngine.db.find(x => x.id === id);
            p.imprimirItem = !p.imprimirItem;
            this.renderListas();
            SyncUI.show('Salvando...', 'syncing');
            StorageService.setData(AppEngine.db)
                .then(() => SyncUI.show('Salvo', 'ok'))
                .catch(() => SyncUI.show('Erro ao salvar', 'error'));
        },

        async toggleTodasImpressoes() {
            const algumMarcado = AppEngine.db.some(i => i.imprimirItem !== false);
            AppEngine.db.forEach(item => { item.imprimirItem = !algumMarcado; });
            this.renderListas();
            SyncUI.show('Salvando...', 'syncing');
            StorageService.setData(AppEngine.db)
                .then(() => SyncUI.show('Salvo', 'ok'))
                .catch(() => SyncUI.show('Erro ao salvar', 'error'));
        },

        async excluirDemanda(id) {
            if (confirm("Excluir?")) {
                AppEngine.db = AppEngine.db.filter(i => i.id !== id);
                AppEngine.itemAtivoId = null;
                document.getElementById('painel-rolagem').innerHTML = '';
                document.getElementById('btn-salvar-geral').classList.add('hidden');
                this.renderListas();
                SyncUI.show('Excluindo...', 'syncing');
                StorageService.setData(AppEngine.db)
                    .then(() => StorageService.deleteLogs(id))
                    .then(() => SyncUI.show('Excluído', 'ok'))
                    .catch(() => SyncUI.show('Erro ao excluir', 'error'));
            }
        },

        async edL(id, idx, text) {
            const l = await StorageService.getLogs(id);
            l[idx].texto = text;
            await StorageService.setLogs(id, l);
        },

        async togL(id, idx) {
            const l = await StorageService.getLogs(id);
            l[idx].imprimir = !l[idx].imprimir;
            SyncUI.show('Salvando...', 'syncing');
            await StorageService.setLogs(id, l);
            SyncUI.show('Salvo', 'ok');
            await this.updateLogUI(id);
        },

        async exL(id, idx) {
            if (confirm('Excluir?')) {
                const l = await StorageService.getLogs(id);
                l.splice(idx, 1);
                SyncUI.show('Excluindo log...', 'syncing');
                await StorageService.setLogs(id, l);
                SyncUI.show('Salvo', 'ok');
                await this.updateLogUI(id);
            }
        },

        async editP(id, i, text) {
            AppEngine.db.find(x => x.id === id).passos[i] = text;
            await StorageService.setData(AppEngine.db);
        },

        async remP(id, i) {
            AppEngine.db.find(x => x.id === id).passos.splice(i, 1);
            SyncUI.show('Salvando...', 'syncing');
            await this.abrirDetalhes(id);
            StorageService.setData(AppEngine.db)
                .then(() => SyncUI.show('Salvo', 'ok'))
                .catch(() => SyncUI.show('Erro ao salvar', 'error'));
        },

        async addP(id) {
            const input = document.getElementById('pendencia-input');
            if (!input.innerText.trim()) return;
            AppEngine.db.find(x => x.id === id).passos.push(input.innerText);
            SyncUI.show('Salvando...', 'syncing');
            await this.abrirDetalhes(id);
            StorageService.setData(AppEngine.db)
                .then(() => SyncUI.show('Salvo', 'ok'))
                .catch(() => SyncUI.show('Erro ao salvar', 'error'));
        },

        async renderizarPadraoExecutivo() {
            const painel = document.getElementById('painel-rolagem'); Navigation.voltarParaApp();
            document.getElementById('report-toolbar').style.display = 'flex';
            document.getElementById('topo-app').classList.add('hidden');
            document.getElementById('sidebar-listas').classList.add('hidden');
            const filtroAtual = document.getElementById('filter-status').value;
            let itensFiltrados = AppEngine.db.filter(i => i.imprimirItem !== false);
            if (filtroAtual !== 'todos') itensFiltrados = itensFiltrados.filter(i => i.status === filtroAtual);
            let html = `<div class="folha-a4 doc-body" style="padding: 20mm 25mm;"><div class="header-infra"><img src="${LOGO_INFRA_BASE64}"></div><div class="relatorio-titulo">RELATÓRIO SEMANAL Nº ${AppEngine.config.semana.replace(/\D/g,"")}/2026/${AppEngine.config.tituloComp}</div><div class="data-extenso">Brasília, ${new Date().toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' })}</div><div class="mb-6"><strong>Assunto:</strong> Levantamento de Demandas - Período: ${AppEngine.config.periodo}</div>`;
            for (const [index, item] of itensFiltrados.entries()) {
                const logs = (await StorageService.getLogs(item.id)).filter(l => l.imprimir).sort((a, b) => new Date(b.data) - new Date(a.data));
                const cor = item.status === 'urgente' ? '#ef4444' : item.status === 'pendente' ? '#facc15' : item.status === 'andamento' ? '#3b82f6' : item.status === 'aguardando' ? '#94a3b8' : '#10b981';
                html += `<div class="doc-section"><div class="doc-item-header"><span style="width:10px;height:10px;border-radius:50%;background:${cor}"></span><span class="doc-item-title">${index + 1}. ${item.nome.toUpperCase()}</span></div><span class="doc-label">CONTEXTO</span><div class="doc-content">${item.processo || 'N/A'}</div><span class="doc-label">PENDÊNCIAS</span><div class="doc-content">${item.passos.length ? item.passos.map(px => `• ${px}`).join('\n') : 'Nenhuma.'}</div>${logs.length ? `<span class="doc-label">HISTÓRICO</span><div class="doc-content">${logs.map(l => `<span style="font-size: 9pt; color: #1abc9c; font-weight: bold;">${formatarDT(l.data)}</span> ${l.texto}`).join('\n')}</div>` : ''}</div>`;
            }
            html += `<div class="footer-report" style="position:static; margin-top: 40px;"><span>SGD - ${AppEngine.config.tituloComp}</span><span>Gerado em: ${formatarDT(new Date())}</span></div></div>`;
            painel.innerHTML = html;
        },

        async renderizarSimplificado() {
            const painel = document.getElementById('painel-rolagem'); Navigation.voltarParaApp();
            document.getElementById('report-toolbar').style.display='flex';
            document.getElementById('topo-app').classList.add('hidden');
            document.getElementById('sidebar-listas').classList.add('hidden');
            const filtroAtual = document.getElementById('filter-status').value;
            let itensFiltrados = AppEngine.db.filter(i => i.imprimirItem !== false);
            if (filtroAtual !== 'todos') itensFiltrados = itensFiltrados.filter(i => i.status === filtroAtual);
            let htmlPaginas = "";
            let cabecalho = `<div style="margin-bottom:10px; font-weight:bold; border-bottom: 2px solid #000;">RELATÓRIO SIMPLIFICADO - ${AppEngine.config.semana.toUpperCase()} | PERÍODO: ${AppEngine.config.periodo.toUpperCase()}</div>`;
            let bufferTexto = cabecalho;
            for (const [index, item] of itensFiltrados.entries()) {
                const logs = (await StorageService.getLogs(item.id)).filter(l => l.imprimir).sort((a, b) => new Date(b.data) - new Date(a.data));
                let demandaTexto = `\n<strong>>>> ${index + 1}. ${item.nome.toUpperCase()}</strong>\n\n`;
                demandaTexto += `CONTEXTO:\n${item.processo || 'N/A'}\n\n`;
                demandaTexto += `HISTÓRICO:\n${logs.length ? logs.map(l => `<span style="font-size: 8.5pt; color: #1abc9c; font-weight: bold;">${formatarDT(l.data)}</span> ${l.texto}`).join('\n') : 'N/A'}\n\n`;
                demandaTexto += `PENDÊNCIAS:\n${item.passos.length ? item.passos.map(p => `• ${p}`).join('\n') : 'Nenhuma.'}\n\n`;
                demandaTexto += `############################################################################################\n`;
                bufferTexto += demandaTexto;
                if ((index + 1) % 3 === 0 || (index + 1) === itensFiltrados.length) {
                    htmlPaginas += `<div class="folha-a4 doc-body" style="min-height:297mm; white-space: pre-wrap; padding: 15mm;">${bufferTexto}</div>`;
                    bufferTexto = cabecalho;
                }
            }
            painel.innerHTML = htmlPaginas;
        },

        async copiarTexto() {
            try {
                const filtroAtual = document.getElementById('filter-status').value;
                let itensFiltrados = AppEngine.db.filter(i => i.imprimirItem !== false);
                if (filtroAtual !== 'todos') itensFiltrados = itensFiltrados.filter(i => i.status === filtroAtual);
                if (itensFiltrados.length === 0) { alert("Nenhum conteúdo filtrado para copiar."); return; }
                const SEP = '#'.repeat(71);
                const estiloWord = `<style>body{font-family:Arial,sans-serif;font-size:10pt;color:#333;}p,li{margin:0;padding:0;font-family:Arial,sans-serif;font-size:10pt;}</style><style>@page WordSection1{size:595.3pt 841.9pt;margin:70.85pt 85.05pt 70.85pt 85.05pt;}div.WordSection1{page:WordSection1;}p.MsoNormal,li.MsoNormal,div.MsoNormal{margin:0cm;margin-bottom:.0001pt;font-size:10.0pt;font-family:Arial,sans-serif;line-height:100%;}</style>`;
                const S = `class="MsoNormal" style="margin:0;margin-bottom:0;padding:0;line-height:100%;font-size:10pt;font-family:Arial,sans-serif;"`;
                const lp  = (html) => `<p ${S}>${html || '&nbsp;'}</p>`;
                const label = (txt) => `<span style="font-weight:600;">${txt}</span>`;
                const dataSpan = (dt) => `<span style="color:#1abc9c;font-size:8pt;font-weight:normal;">${dt}</span>`;
                let corpo = '<div class="WordSection1">';
                corpo += `<p class="MsoNormal" style="margin:0;margin-bottom:0;padding:0 0 2px 0;line-height:100%;font-size:10pt;font-family:Arial,sans-serif;font-weight:bold;border-bottom:2pt solid black;">RELATÓRIO SIMPLIFICADO - ${AppEngine.config.semana.toUpperCase()} | PERÍODO: ${AppEngine.config.periodo.toUpperCase()}</p>`;
                for (const [index, item] of itensFiltrados.entries()) {
                    const logs = (await StorageService.getLogs(item.id)).filter(l => l.imprimir).sort((a, b) => new Date(b.data) - new Date(a.data));
                    corpo += lp('&nbsp;');
                    corpo += lp(`<strong>&gt;&gt;&gt; ${index + 1}. ${item.nome.toUpperCase()}</strong>`);
                    corpo += lp(label('CONTEXTO:'));
                    if (item.processo) item.processo.split('\n').forEach(linha => corpo += lp(linha || '&nbsp;'));
                    else corpo += lp('N/A');
                    corpo += lp('&nbsp;');
                    corpo += lp(label('HISTÓRICO:'));
                    if (logs.length) {
                        logs.forEach(l => { l.texto.split('\n').forEach((linha, li) => { if (li === 0) corpo += lp(`${dataSpan(formatarDT(l.data))} ${linha}`); else corpo += lp(linha || '&nbsp;'); }); });
                    } else corpo += lp('N/A');
                    corpo += lp('&nbsp;');
                    corpo += lp(label('PENDÊNCIAS:'));
                    if (item.passos.length) { item.passos.forEach(p => { p.split('\n').forEach((linha, li) => corpo += lp((li === 0 ? '• ' : '') + (linha || ''))); }); }
                    else corpo += lp('Nenhuma.');
                    corpo += lp(`<span style="color:#aaa;">${SEP}</span>`);
                }
                corpo += '</div>';
                const htmlCompleto = `<html><head><meta charset="UTF-8">${estiloWord}</head><body>${corpo}</body></html>`;
                const blob = new Blob([htmlCompleto], { type: 'text/html' });
                await navigator.clipboard.write([new ClipboardItem({ 'text/html': blob })]);
                alert("Copiado com sucesso!");
            } catch (err) { alert("Erro ao copiar."); }
        }
    };

    // ─────────────────────────────────────────────
    // INICIALIZAÇÃO — aguarda o Firebase estar pronto
    // ─────────────────────────────────────────────
    function startApp() {
        StorageService.init(window._firestore, window._firestoreLib);
        AppEngine.init().catch(err => {
            console.error(err);
            document.querySelector('#loading-screen p').textContent = 'Erro ao conectar. Verifique as regras do Firestore.';
            SyncUI.show('Erro de conexão', 'error');
        });
    }

    if (window._firebaseReady) {
        startApp();
    } else {
        window.addEventListener('firebase-ready', startApp);
    }

    document.getElementById('btn-pdf-trigger').onclick = () => {
        const element = document.getElementById('painel-rolagem');
        const opt = { margin: [10, 10, 10, 10], filename: 'Relatorio.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(element).save();
    };

    window.addEventListener('keydown', e => { if((e.ctrlKey || e.metaKey) && e.key === 's'){ e.preventDefault(); AppEngine.salvarAlteracoesPagina(); } });
    </script>
</body>
