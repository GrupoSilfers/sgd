<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGD - SISTEMA DE GESTÃO DE DEMANDAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --infra-dark: #2c3e50; --infra-blue: #34495e; --infra-green: #1abc9c; }
        .item-active { background-color: rgba(26, 188, 156, 0.1); border-right: 4px solid var(--infra-green); margin-right: 4px; }
        #main-app { display: grid; grid-template-columns: auto 1fr; height: 100vh; overflow: hidden; }
        #sidebar-infra { width: 220px; background-color: var(--infra-dark); transition: width 0.3s; display: flex; flex-direction: column; color: white; z-index: 50; }
        #sidebar-infra.collapsed { width: 75px; }
        .collapsed .nav-text, .collapsed .user-info, .collapsed .config-label, .collapsed .chevron-icon { display: none; }
        .nav-item { display: flex; align-items: center; padding: 12px 24px; cursor: pointer; transition: background 0.2s; white-space: nowrap; color: #cbd5e1; }
        .nav-item i { min-width: 20px; flex-shrink: 0; } 
        .nav-item:hover { background-color: rgba(255,255,255,0.1); color: white; }
        .submenu { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: rgba(0,0,0,0.1); }
        .submenu.open { max-height: 200px; }
        .nav-subitem { padding: 10px 24px 10px 60px; font-size: 13px; cursor: pointer; color: #cbd5e1; transition: background 0.2s; }
        .nav-subitem:hover { background-color: rgba(0, 0, 0, 0.3); color: white; }
        #report-toolbar { position: fixed; top: 20px; right: 40px; display: none; align-items: center; gap: 15px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 10px 20px; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
        .icon-btn { color: #64748b; transition: all 0.2s; cursor: pointer; background: none; border: none; outline: none; }
        .icon-btn:hover { color: var(--infra-green); transform: scale(1.1); }
        #painel-rolagem { scrollbar-gutter: stable; overflow-y: auto; background-color: #f1f5f9; }
        .folha-a4 { background: white; width: 210mm; min-height: 297mm; padding: 20mm; margin: 20px auto; box-shadow: 0 0 20px rgba(0,0,0,0.05); color: #333; position: relative; }
        .header-infra { text-align: center; margin-bottom: 20px; }
        .header-infra img { height: 45px; margin: 0 auto; display: block; }
        .doc-body { font-family: Arial, sans-serif; line-height: 1.5; text-align: justify; font-size: 10pt; }
        .relatorio-titulo { text-align: center; font-size: 11pt; margin-top: 10px; text-transform: uppercase; font-weight: normal; }
        .data-extenso { text-align: right; margin: 24px 0; font-size: 10pt; }
        .doc-section { margin-top: 15px; page-break-inside: avoid; border-bottom: 1px dashed #eee; padding-bottom: 10px; }
        .doc-item-header { background-color: #f3f4f6; padding: 6px 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .doc-item-title { font-weight: bold; text-transform: uppercase; font-size: 10pt; color: #000; }
        .doc-label { font-weight: normal; text-transform: uppercase; font-size: 10pt; color: #555; margin-top: 10px; margin-bottom: 2px; display: block; }
        .doc-content { margin-bottom: 8px; padding-left: 5px; font-size: 10pt; color: #333; white-space: pre-wrap; }
        .historico-timestamp { font-size: 9pt; color: #777; font-weight: normal; margin-right: 8px; }
        .footer-report { position: absolute; bottom: 10mm; left: 20mm; right: 20mm; border-top: 1px solid #eee; padding-top: 5px; font-size: 8pt; color: #999; display: flex; justify-content: space-between; }
        .btn-menu-original { background-color: #1abc9c; color: white; border-radius: 4px; padding: 6px; }
        .secao-card { background: white; border-radius: 4px; border: 1px solid #e2e8f0; margin-bottom: 1.5rem; overflow: hidden; }
        .secao-header { background: #f8fafc; border-bottom: 1px solid #e2e8f0; padding: 10px 16px; font-size: 11px; font-weight: normal; color: var(--infra-blue); text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .textarea-processo { padding: 16px; min-height: 100px; outline: none; color: #475569; white-space: pre-wrap; line-height: 1.6; font-size: 14px; }
        .header-especial-full { background-color: #1e293b; padding: 10px 16px; font-size: 10px; font-weight: 900; color: white; text-transform: uppercase; display: flex; align-items: center; gap: 8px; width: 100%; justify-content: space-between; }
        .print-indicator { color: #cbd5e1; transition: opacity 0.2s; opacity: 0; }
        .item-sidebar-container:hover .print-indicator { opacity: 1; }
        .print-indicator.print-active { opacity: 1 !important; color: #ef4444 !important; }
        .handle { cursor: grab !important; color: #cbd5e1; }
        .btn-add-mini { background-color: #1abc9c; color: white; border-radius: 4px; padding: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 20px; height: 20px; }
        .input-prefix-container { display: flex; align-items: center; border: 1px solid #e2e8f0; border-radius: 0.25rem; padding-left: 8px; background-color: #f8fafc; }
        .prefix-text { color: #94a3b8; font-size: 0.875rem; white-space: nowrap; user-select: none; padding-right: 4px; }
        @media print { .no-print { display: none !important; } #main-app { display: block; } .folha-a4 { margin: 0; box-shadow: none; width: 100%; } }
    </style>
</head>
<body class="text-slate-900 font-sans">
    <div id="report-toolbar" class="no-print">
        <button onclick="RenderEngine.copiarTexto()" class="icon-btn" title="Copiar"><i data-lucide="copy"></i></button>
        <button id="btn-pdf-trigger" class="icon-btn text-emerald-600" title="Gerar PDF"><i data-lucide="file-text"></i></button>
        <div class="w-px h-6 bg-slate-200 mx-1"></div>
        <button onclick="Navigation.voltarParaApp()" class="icon-btn text-red-500" title="Fechar"><i data-lucide="x"></i></button>
    </div>

    <div id="main-app">
        <aside id="sidebar-infra" class="no-print">
            <div class="p-4 border-b border-slate-700 flex flex-col items-center">
                <div class="mb-3 relative cursor-pointer group" onclick="document.getElementById('input-foto').click()">
                    <img src="" id="user-img-sidebar" class="w-12 h-12 rounded-full border-2 border-infra-green object-cover">
                    <input type="file" id="input-foto" class="hidden" accept="image/*" onchange="AppEngine.alterarFoto(event)">
                </div>
                <div class="user-info text-center">
                    <p id="user-name-sidebar" class="text-xs font-bold uppercase tracking-wider"></p>
                    <p id="user-role-sidebar" class="text-[10px] text-slate-400 mt-1"></p>
                </div>
            </div>
            <nav class="flex-1 mt-4">
                <div onclick="Navigation.toggleSubmenu('sub-rel')" class="nav-item" title="Relatórios"><i data-lucide="printer" class="w-5 h-5 text-emerald-400 mr-3"></i><span class="nav-text text-sm">Relatórios</span><i data-lucide="chevron-down" class="w-4 h-4 ml-auto chevron-icon"></i></div>
                <div id="sub-rel" class="submenu">
                    <div onclick="RenderEngine.renderizarPadraoExecutivo()" class="nav-subitem">Padrão</div>
                    <div onclick="RenderEngine.renderizarSimplificado()" class="nav-subitem">Simplificado</div>
                </div>
                <div onclick="AppEngine.exportarBackup()" class="nav-item" title="Exportar Dados"><i data-lucide="download-cloud" class="w-5 h-5 text-amber-400 mr-3"></i><span class="nav-text text-sm">Exportar Dados</span></div>
                <label class="nav-item cursor-pointer" title="Importar Backup"><i data-lucide="upload-cloud" class="w-5 h-5 text-blue-400 mr-3"></i><span class="nav-text text-sm">Importar Backup</span><input type="file" class="hidden" accept=".json" onchange="AppEngine.importarBackup(event)"></label>
                <div class="mt-6 border-t border-slate-700 pt-4">
                    <div class="px-6 mb-2 config-label text-[10px] font-black text-slate-500 uppercase tracking-widest">Configurações</div>
                    <div onclick="Navigation.toggleModal('modal-user')" class="nav-item"><i data-lucide="user-cog" class="w-5 h-5 text-slate-400 mr-3"></i><span class="nav-text text-sm">Usuário</span></div>
                    <div onclick="Navigation.toggleModal('modal-gestao')" class="nav-item"><i data-lucide="component" class="w-5 h-5 text-slate-400 mr-3"></i><span class="nav-text text-sm">Gestão</span></div>
                    <div onclick="Navigation.toggleModal('modal-titulo')" class="nav-item"><i data-lucide="type" class="w-5 h-5 text-slate-400 mr-3"></i><span class="nav-text text-sm">Área de Trabalho</span></div>
                </div>
            </nav>
        </aside>

        <div class="flex flex-col overflow-hidden">
            <header id="topo-app" class="bg-[#f3f3f3] border-b p-4 shadow-sm z-10 no-print flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <button onclick="Navigation.toggleSidebar()" class="btn-menu-original"><i data-lucide="menu" class="w-5 h-5"></i></button>
                    <div>
                        <h1 class="text-slate-700 text-lg font-normal uppercase leading-tight">SGD - SISTEMA DE GESTÃO DE DEMANDAS</h1>
                        <div class="flex items-center gap-2 mt-0.5 text-slate-500">
                            <span id="display-subtitulo" class="text-[11px] font-normal uppercase tracking-wider"></span>
                            <span class="text-slate-300">|</span>
                            <p class="text-[13px] font-normal uppercase"><span id="display-semana"></span> | <span id="display-periodo"></span></p>
                        </div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <select id="sort-order" onchange="RenderEngine.renderListas()" class="text-[10px] p-2 border rounded bg-white font-normal outline-none"><option value="asc">A-Z</option><option value="desc">Z-A</option></select>
                    <select id="filter-status" onchange="RenderEngine.renderListas()" class="text-[10px] p-2 border rounded bg-white font-normal outline-none">
                        <option value="todos">STATUS</option><option value="especial">🔴 ESPECIAL</option><option value="pendente">🟡 PENDENTE</option><option value="andamento">🔵 ANDAMENTO</option><option value="concluido">🟢 CONCLUÍDO</option>
                    </select>
                    <input type="text" id="busca-rapida" oninput="RenderEngine.renderListas()" placeholder="Pesquisar..." class="pl-4 pr-4 py-2 bg-white border border-slate-200 rounded-lg text-xs outline-none">
                </div>
            </header>
            <div class="flex flex-1 overflow-hidden">
                <aside id="sidebar-listas" class="w-80 border-r bg-white flex flex-col no-print">
                    <div class="overflow-y-auto flex-1">
                        <div class="p-3 bg-slate-50 text-[10px] font-black border-b flex justify-between items-center text-slate-400">
                            <span>TRATATIVAS ATIVAS</span>
                            <div class="flex items-center"><span id="count-ativas" class="mr-2 font-normal text-[10px]">0/0</span><button onclick="AppEngine.adicionarNovaDemanda()" class="btn-add-mini"><i data-lucide="plus" class="w-4 h-4"></i></button></div>
                        </div>
                        <nav id="lista-ativa"></nav>
                        <div class="header-especial-full"><div>ACOMPANHAMENTO ESPECIAL</div><span id="count-especial" class="font-normal text-[10px]">0/0</span></div>
                        <nav id="lista-especial" class="min-h-[100px]"></nav>
                    </div>
                </aside>
                <main id="painel-rolagem" class="flex-1 p-8"></main>
            </div>
        </div>
    </div>

    <!-- Modais -->
    <div id="modal-user" class="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] hidden">
        <div class="bg-white p-6 rounded-lg w-96 shadow-xl">
            <h3 class="text-lg font-bold mb-4">Configurar Usuário</h3>
            <div class="space-y-4">
                <input type="text" id="input-username" placeholder="Nome" class="w-full p-2 border rounded text-sm">
                <input type="text" id="input-userrole" placeholder="Cargo" class="w-full p-2 border rounded text-sm">
            </div>
            <div class="flex justify-end gap-2 mt-6"><button onclick="Navigation.toggleModal('modal-user')" class="px-4 py-2 text-sm">Cancelar</button><button onclick="AppEngine.salvarConfig()" class="px-4 py-2 text-sm bg-emerald-600 text-white rounded font-bold">SALVAR</button></div>
        </div>
    </div>
    <div id="modal-gestao" class="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] hidden">
        <div class="bg-white p-6 rounded-lg w-96 shadow-xl">
            <h3 class="text-lg font-bold mb-4">Configurar Gestão</h3>
            <div class="space-y-4">
                <input type="text" id="input-subtitulo" placeholder="Subtítulo" class="w-full p-2 border rounded text-sm">
                <input type="text" id="input-semana" placeholder="Semana" class="w-full p-2 border rounded text-sm">
                <input type="text" id="input-periodo" placeholder="Período" class="w-full p-2 border rounded text-sm">
            </div>
            <div class="flex justify-end gap-2 mt-6"><button onclick="Navigation.toggleModal('modal-gestao')" class="px-4 py-2 text-sm">Cancelar</button><button onclick="AppEngine.salvarConfig()" class="px-4 py-2 text-sm bg-emerald-600 text-white rounded font-bold">SALVAR</button></div>
        </div>
    </div>
    <div id="modal-titulo" class="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] hidden">
        <div class="bg-white p-6 rounded-lg w-[500px] shadow-xl">
            <h3 class="text-lg font-bold mb-4">Área de Trabalho</h3>
            <div class="space-y-4">
                <div class="input-prefix-container"><span id="prefixo-titulo" class="prefix-text"></span><input type="text" id="input-titulo-comp" class="flex-1 p-2 text-sm outline-none bg-transparent"></div>
            </div>
            <div class="flex justify-end gap-2 mt-6"><button onclick="Navigation.toggleModal('modal-titulo')" class="px-4 py-2 text-sm">Cancelar</button><button onclick="AppEngine.salvarConfig()" class="px-4 py-2 text-sm bg-emerald-600 text-white rounded font-bold">SALVAR</button></div>
        </div>
    </div>

    <button id="btn-salvar-geral" onclick="AppEngine.salvarAlteracoesPagina()" class="fixed bottom-8 right-8 bg-emerald-600 text-white px-6 py-3 rounded-full shadow-2xl font-bold text-xs flex items-center gap-2 z-50 no-print hidden">
        <i data-lucide="save" class="w-4 h-4"></i><span><u>S</u>ALVAR ALTERAÇÕES</span>
    </button>


    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBo8BUsjqM0lrKlRCSxOcIBWsBB0J7REs",
            authDomain: "sgd1-9f9ab.firebaseapp.com",
            projectId: "sgd1-9f9ab",
            storageBucket: "sgd1-9f9ab.firebasestorage.app",
            messagingSenderId: "644440649174",
            appId: "1:644440649174:web:e85490e18007e861e80877"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Indicador de sincronização
        function showSync(msg, cor = '#1abc9c') {
            let el = document.getElementById('sync-indicator');
            if (!el) {
                el = document.createElement('div');
                el.id = 'sync-indicator';
                el.style.cssText = 'position:fixed;bottom:80px;right:32px;background:'+cor+';color:white;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:bold;z-index:9999;transition:opacity 0.5s;';
                document.body.appendChild(el);
            }
            el.style.background = cor;
            el.style.opacity = '1';
            el.innerText = msg;
            clearTimeout(el._t);
            el._t = setTimeout(() => el.style.opacity = '0', 2500);
        }

        const StorageService = {
            CONFIG_KEY: 'gestao_config',

            async getData() {
                try {
                    const snap = await getDocs(collection(db, 'demandas'));
                    return snap.docs.map(d => d.data());
                } catch(e) { console.error(e); return []; }
            },

            async setData(data) {
                try {
                    for (const item of data) {
                        await setDoc(doc(db, 'demandas', item.id), item);
                    }
                    showSync('☁ Salvo na nuvem');
                } catch(e) { showSync('⚠ Erro ao salvar', '#ef4444'); console.error(e); }
            },

            async deleteItem(id) {
                try {
                    await deleteDoc(doc(db, 'demandas', id));
                } catch(e) { console.error(e); }
            },

            getConfig: () => JSON.parse(localStorage.getItem('gestao_config')) || { subtitulo: "GEPEM", semana: "Semana 13", periodo: "22/03 a 27/03/2026", userName: "Ezequiel G. Ferreira", userRole: "Gestor Substituto", userImg: "https://i.imgur.com/8K9pY7u.png", tituloComp: "GEPEM/SUINM/DIMEI-INFRASA" },
            setConfig: (config) => localStorage.setItem('gestao_config', JSON.stringify(config)),

            async getLogs(id) {
                try {
                    const snap = await getDoc(doc(db, 'logs', id));
                    return snap.exists() ? snap.data().entries : [];
                } catch(e) { return []; }
            },

            async setLogs(id, logs) {
                try {
                    await setDoc(doc(db, 'logs', id), { entries: logs });
                } catch(e) { console.error(e); }
            }
        };

        const AppEngine = {
            db: [],
            config: StorageService.getConfig(),
            itemAtivoId: null,

            async init() {
                showSync('⏳ Carregando...', '#64748b');
                this.db = await StorageService.getData();
                this.config = StorageService.getConfig();
                this.aplicarConfig();
                RenderEngine.renderListas();
                lucide.createIcons();
                showSync('✓ Conectado ao Firebase');
            },

            aplicarConfig() {
                document.getElementById('display-subtitulo').innerText = this.config.subtitulo;
                document.getElementById('display-semana').innerText = this.config.semana;
                document.getElementById('display-periodo').innerText = this.config.periodo;
                document.getElementById('user-name-sidebar').innerText = this.config.userName;
                document.getElementById('user-role-sidebar').innerText = this.config.userRole;
                document.getElementById('user-img-sidebar').src = this.config.userImg;
            },

            salvarConfig() {
                if (!document.getElementById('modal-user').classList.contains('hidden')) {
                    this.config.userName = document.getElementById('input-username').value;
                    this.config.userRole = document.getElementById('input-userrole').value;
                }
                if (!document.getElementById('modal-gestao').classList.contains('hidden')) {
                    this.config.subtitulo = document.getElementById('input-subtitulo').value;
                    this.config.semana = document.getElementById('input-semana').value;
                    this.config.periodo = document.getElementById('input-periodo').value;
                }
                if (!document.getElementById('modal-titulo').classList.contains('hidden')) {
                    this.config.tituloComp = document.getElementById('input-titulo-comp').value;
                }
                StorageService.setConfig(this.config);
                this.aplicarConfig();
                Navigation.fecharModais();
            },

            async adicionarNovaDemanda() {
                const nova = { id: Date.now().toString(), nome: 'NOVA DEMANDA', dataReg: new Date().toLocaleDateString('pt-BR'), status: 'pendente', grupo: 'ativa', processo: '', passos: [], imprimirItem: true };
                this.db.push(nova);
                await StorageService.setData(this.db);
                RenderEngine.abrirDetalhes(nova.id);
            },

            async salvarAlteracoesPagina() {
                if (!this.itemAtivoId) return;
                const item = this.db.find(i => i.id === this.itemAtivoId);
                item.nome = document.getElementById('edit-nome').innerText;
                item.status = document.getElementById('edit-status').value;
                item.processo = document.getElementById('edit-processo').innerText;
                await StorageService.setData(this.db);
                RenderEngine.renderListas();
                const btn = document.getElementById('btn-salvar-geral');
                btn.innerText = '✔ SALVO';
                setTimeout(() => { btn.innerHTML = '<i data-lucide="save" class="w-4 h-4"></i><span><u>S</u>ALVAR ALTERAÇÕES</span>'; lucide.createIcons(); }, 2000);
            },

            async lancarLog(id) {
                const input = document.getElementById('log-input');
                const texto = input.innerText.trim();
                if (!texto) return;
                const logs = await StorageService.getLogs(id);
                logs.push({ data: new Date().toLocaleDateString('pt-BR'), texto, imprimir: true });
                await StorageService.setLogs(id, logs);
                input.innerText = '';
                RenderEngine.toggleLogArea();
                RenderEngine.updateLogUI(id);
            },

            exportarBackup() {
                const b = { db: this.db };
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([JSON.stringify(b, null, 2)], { type: "application/json" }));
                a.download = `BACKUP_SGD.json`;
                a.click();
            },

            importarBackup(e) {
                const reader = new FileReader();
                reader.onload = async ev => {
                    const data = JSON.parse(ev.target.result);
                    this.db = data.db;
                    await StorageService.setData(this.db);
                    location.reload();
                };
                reader.readAsText(e.target.files[0]);
            },

            alterarFoto(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = ev => { this.config.userImg = ev.target.result; document.getElementById('user-img-sidebar').src = ev.target.result; StorageService.setConfig(this.config); };
                    reader.readAsDataURL(file);
                }
            }
        };

        const Navigation = {
            toggleSidebar() { document.getElementById('sidebar-infra').classList.toggle('collapsed'); lucide.createIcons(); },
            toggleSubmenu(id) {
                const s = document.getElementById('sidebar-infra');
                if (s.classList.contains('collapsed')) s.classList.remove('collapsed');
                document.getElementById(id).classList.toggle('open');
                lucide.createIcons();
            },
            toggleModal(id) {
                const m = document.getElementById(id);
                if (m.classList.contains('hidden')) {
                    if (id === 'modal-user') { document.getElementById('input-username').value = AppEngine.config.userName; document.getElementById('input-userrole').value = AppEngine.config.userRole; }
                    if (id === 'modal-gestao') { document.getElementById('input-subtitulo').value = AppEngine.config.subtitulo; document.getElementById('input-semana').value = AppEngine.config.semana; document.getElementById('input-periodo').value = AppEngine.config.periodo; }
                    if (id === 'modal-titulo') { document.getElementById('prefixo-titulo').innerText = `RELATÓRIO SEMANAL Nº ${AppEngine.config.semana.replace(/\D/g, "")}/2026/`; document.getElementById('input-titulo-comp').value = AppEngine.config.tituloComp; }
                }
                m.classList.toggle('hidden');
            },
            fecharModais() { document.querySelectorAll('[id^="modal-"]').forEach(m => m.classList.add('hidden')); },
            voltarParaApp() {
                document.getElementById('report-toolbar').style.display = 'none';
                document.getElementById('topo-app').classList.remove('hidden');
                document.getElementById('sidebar-listas').classList.remove('hidden');
                document.getElementById('painel-rolagem').innerHTML = '';
                AppEngine.itemAtivoId = null;
                document.getElementById('btn-salvar-geral').classList.add('hidden');
            }
        };

        const RenderEngine = {
            renderListas() {
                const db = AppEngine.db;
                const ordem = document.getElementById('sort-order').value;
                const filtro = document.getElementById('filter-status').value;
                const busca = document.getElementById('busca-rapida').value.toLowerCase();

                let ativas = db.filter(i => i.grupo !== 'especial');
                let especiais = db.filter(i => i.grupo === 'especial');

                if (filtro !== 'todos') { ativas = ativas.filter(i => i.status === filtro); especiais = especiais.filter(i => i.status === filtro); }
                if (busca) { ativas = ativas.filter(i => i.nome.toLowerCase().includes(busca)); especiais = especiais.filter(i => i.nome.toLowerCase().includes(busca)); }

                const sort = (a, b) => ordem === 'asc' ? a.nome.localeCompare(b.nome) : b.nome.localeCompare(a.nome);
                ativas.sort(sort); especiais.sort(sort);

                const totalAtivas = db.filter(i => i.grupo !== 'especial').length;
                const totalEspeciais = db.filter(i => i.grupo === 'especial').length;
                document.getElementById('count-ativas').innerText = `${ativas.length}/${totalAtivas}`;
                document.getElementById('count-especial').innerText = `${especiais.length}/${totalEspeciais}`;

                const renderItem = (p) => {
                    const cores = { especial: '#ef4444', pendente: '#facc15', andamento: '#3b82f6', concluido: '#10b981' };
                    const cor = cores[p.status] || '#94a3b8';
                    const ativo = p.id === AppEngine.itemAtivoId ? 'item-active' : '';
                    return `<div class="item-sidebar-container flex items-center gap-2 px-3 py-2 cursor-pointer hover:bg-slate-50 ${ativo}" onclick="RenderEngine.abrirDetalhes('${p.id}')">
                        <span style="width:8px;height:8px;border-radius:50%;background:${cor};flex-shrink:0"></span>
                        <span class="flex-1 text-xs truncate">${p.nome}</span>
                        <span class="print-indicator ${p.imprimirItem !== false ? 'print-active' : ''}" onclick="event.stopPropagation();RenderEngine.toggleImp('${p.id}')"><i data-lucide="printer" class="w-3 h-3"></i></span>
                    </div>`;
                };

                document.getElementById('lista-ativa').innerHTML = ativas.map(renderItem).join('');
                document.getElementById('lista-especial').innerHTML = especiais.map(renderItem).join('');
                lucide.createIcons();
            },

            async abrirDetalhes(id) {
                AppEngine.itemAtivoId = id;
                const p = AppEngine.db.find(x => x.id === id);
                if (!p) return;
                this.renderListas();
                document.getElementById('btn-salvar-geral').classList.remove('hidden');
                const cores = { especial: 'text-red-500', pendente: 'text-yellow-500', andamento: 'text-blue-500', concluido: 'text-emerald-500' };
                const painel = document.getElementById('painel-rolagem');
                painel.innerHTML = `<div class="max-w-5xl mx-auto">
                    <div class="flex justify-between items-start mb-6 border-b pb-6">
                        <div><h2 contenteditable="true" id="edit-nome" class="text-3xl font-normal text-slate-800 outline-none uppercase">${p.nome}</h2><p class="text-[10px] text-slate-400 font-normal uppercase mt-2">CRIADO EM ${p.dataReg}</p></div>
                        <div class="flex gap-2">
                            <select id="edit-status" onchange="AppEngine.salvarAlteracoesPagina()" class="p-2 border rounded font-normal text-[10px] bg-white">
                                <option value="especial" ${p.status==='especial'?'selected':''}>🔴 ESPECIAL</option>
                                <option value="pendente" ${p.status==='pendente'?'selected':''}>🟡 PENDENTE</option>
                                <option value="andamento" ${p.status==='andamento'?'selected':''}>🔵 ANDAMENTO</option>
                                <option value="concluido" ${p.status==='concluido'?'selected':''}>🟢 CONCLUÍDO</option>
                            </select>
                            <button onclick="RenderEngine.excluirDemanda('${id}')" class="p-2 border rounded text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <div class="secao-card"><div class="secao-header"><span>Contexto</span></div><div contenteditable="true" id="edit-processo" class="textarea-processo text-sm">${p.processo || ''}</div></div>
                    <div class="secao-card">
                        <div class="secao-header"><span>Histórico</span><button onclick="RenderEngine.toggleLogArea()" class="btn-add-mini"><i data-lucide="plus" class="w-4 h-4"></i></button></div>
                        <div id="logs-container" class="p-4 space-y-3"></div>
                        <div id="input-log-area" class="hidden p-4 border-t bg-white">
                            <div contenteditable="true" id="log-input" class="w-full p-4 border rounded outline-none text-sm min-h-[80px]"></div>
                            <div class="flex justify-end mt-3"><button onclick="AppEngine.lancarLog('${id}')" class="bg-emerald-600 text-white px-4 py-2 rounded text-[10px] font-black uppercase">Adicionar</button></div>
                        </div>
                    </div>
                    <div class="secao-card">
                        <div class="secao-header"><span>Pendências</span><button onclick="RenderEngine.togglePendenciaArea()" class="btn-add-mini"><i data-lucide="plus" class="w-4 h-4"></i></button></div>
                        <div class="p-4"><ul id="prioridades-sort" class="space-y-2">
                            ${p.passos.map((s, i) => `<li class="flex items-center gap-3 bg-white p-3 rounded border group"><div class="handle text-slate-300"><i data-lucide="grip-vertical" class="w-4 h-4"></i></div><div contenteditable="true" onblur="RenderEngine.editP('${id}',${i},this.innerText)" class="flex-1 text-sm outline-none">${s}</div><button onclick="RenderEngine.remP('${id}',${i})" class="text-red-300 opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button></li>`).join('')}
                        </ul></div>
                        <div id="input-pendencia-area" class="hidden p-4 border-t bg-white"><div contenteditable="true" id="pendencia-input" class="w-full p-4 border rounded outline-none text-sm min-h-[60px]"></div><div class="flex justify-end mt-3"><button onclick="RenderEngine.addP('${id}')" class="bg-emerald-600 text-white px-4 py-2 rounded text-[10px] font-black uppercase">Adicionar</button></div></div>
                    </div>
                </div>`;
                this.updateLogUI(id);
                Sortable.create(document.getElementById('prioridades-sort'), { animation: 150, handle: '.handle', onEnd: async () => { p.passos = Array.from(document.querySelectorAll('#prioridades-sort [contenteditable]')).map(el => el.innerText); await StorageService.setData(AppEngine.db); }});
                lucide.createIcons();
            },

            async updateLogUI(id) {
                const logs = await StorageService.getLogs(id);
                document.getElementById('logs-container').innerHTML = [...logs].reverse().map((l, i) => {
                    const idx = logs.length - 1 - i;
                    return `<div class="flex items-start gap-4 p-3 bg-white border rounded group ${l.imprimir?'':'opacity-40'}"><span class="text-[10px] text-emerald-600 shrink-0 mt-1">${l.data}</span><div contenteditable="true" onblur="RenderEngine.edL('${id}',${idx},this.innerText)" class="flex-1 text-sm outline-none">${l.texto}</div><div class="flex gap-2 mt-1"><button onclick="RenderEngine.togL('${id}',${idx})" class="text-slate-300"><i data-lucide="${l.imprimir?'file-text':'file-x-2'}" class="w-4 h-4"></i></button><button onclick="RenderEngine.exL('${id}',${idx})" class="text-red-200 opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`;
                }).join('');
                lucide.createIcons();
            },

            toggleLogArea() { const a = document.getElementById('input-log-area'); a.classList.toggle('hidden'); if(!a.classList.contains('hidden')) document.getElementById('log-input').focus(); },
            togglePendenciaArea() { const a = document.getElementById('input-pendencia-area'); a.classList.toggle('hidden'); if(!a.classList.contains('hidden')) document.getElementById('pendencia-input').focus(); },

            async toggleImp(id) { let p = AppEngine.db.find(x => x.id === id); p.imprimirItem = !p.imprimirItem; await StorageService.setData(AppEngine.db); this.renderListas(); },

            async excluirDemanda(id) {
                if(confirm("Excluir?")) {
                    AppEngine.db = AppEngine.db.filter(i => i.id !== id);
                    await StorageService.deleteItem(id);
                    await StorageService.setData(AppEngine.db);
                    location.reload();
                }
            },

            async edL(id, idx, text) { const l = await StorageService.getLogs(id); l[idx].texto = text; await StorageService.setLogs(id, l); },
            async togL(id, idx) { const l = await StorageService.getLogs(id); l[idx].imprimir = !l[idx].imprimir; await StorageService.setLogs(id, l); this.updateLogUI(id); },
            async exL(id, idx) { if(confirm('Excluir?')){ const l = await StorageService.getLogs(id); l.splice(idx, 1); await StorageService.setLogs(id, l); this.updateLogUI(id); }},
            async editP(id, i, text) { AppEngine.db.find(x => x.id === id).passos[i] = text; await StorageService.setData(AppEngine.db); },
            async remP(id, i) { AppEngine.db.find(x => x.id === id).passos.splice(i, 1); await StorageService.setData(AppEngine.db); this.abrirDetalhes(id); },
            async addP(id) { const input = document.getElementById('pendencia-input'); if(!input.innerText.trim()) return; AppEngine.db.find(x => x.id === id).passos.push(input.innerText); await StorageService.setData(AppEngine.db); this.abrirDetalhes(id); },

            renderizarPadraoExecutivo() {
                const painel = document.getElementById('painel-rolagem'); Navigation.voltarParaApp();
                document.getElementById('report-toolbar').style.display = 'flex'; document.getElementById('topo-app').classList.add('hidden'); document.getElementById('sidebar-listas').classList.add('hidden');
                let html = `<div id="folha-print" class="folha-a4 doc-body"><div class="header-infra"><img src="https://i.imgur.com/u57GgY0.png"></div><div class="relatorio-titulo">RELATÓRIO SEMANAL Nº ${AppEngine.config.semana.replace(/\D/g, "")}/2026/${AppEngine.config.tituloComp}</div><div class="data-extenso">Brasília, ${new Date().toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' })}</div><div class="mb-6"><strong>Assunto:</strong> Levantamento de Demandas - Período: ${AppEngine.config.periodo}</div>`;
                AppEngine.db.forEach((item, index) => {
                    if(item.imprimirItem === false) return;
                    const cor = item.status==='especial'?'#ef4444':item.status==='pendente'?'#facc15':item.status==='andamento'?'#3b82f6':'#10b981';
                    html += `<div class="doc-section"><div class="doc-item-header"><span style="width:10px;height:10px;border-radius:50%;background:${cor}"></span><span class="doc-item-title">${index + 1}. ${item.nome.toUpperCase()}</span></div><span class="doc-label">CONTEXTO</span><div class="doc-content">${item.processo || 'N/A'}</div><span class="doc-label">PENDÊNCIAS</span><div class="doc-content">${item.passos.length ? item.passos.map(px => `• ${px}`).join('<br>') : 'Nenhuma.'}</div></div>`;
                });
                html += `</div><div class="footer-report"><span>SGD - ${AppEngine.config.tituloComp}</span><span>Gerado em: ${new Date().toLocaleString()}</span></div></div>`;
                painel.innerHTML = html;
            },

            renderizarSimplificado() {
                const painel = document.getElementById('painel-rolagem'); Navigation.voltarParaApp();
                document.getElementById('report-toolbar').style.display='flex'; document.getElementById('topo-app').classList.add('hidden'); document.getElementById('sidebar-listas').classList.add('hidden');
                let html = `<div id="folha-print" class="folha-a4 doc-body"><div style="margin-bottom:20px">RELATÓRIO SEMANAL - ${AppEngine.config.semana.toUpperCase()} | PERÍODO: ${AppEngine.config.periodo.toUpperCase()}</div>`;
                AppEngine.db.forEach((item, index) => {
                    if(item.imprimirItem === false) return;
                    html += `<div class="report-line">${"#".repeat(95)}</div><div class="report-line"><strong>>>> ${index + 1}. ${item.nome.toUpperCase()}</strong></div><div class="report-line">CONTEXTO</div><div class="report-line">${item.processo || 'N/A'}</div><br>`;
                    html += `<div class="report-line">PENDÊNCIAS</div>${item.passos.map(px => `<div class="report-line">- ${px}</div>`).join('')}<br>`;
                });
                html += `</div>`; painel.innerHTML = html;
            },

            copiarTexto() { navigator.clipboard.writeText(document.getElementById('folha-print').innerText).then(() => alert("Copiado!")); }
        };

        document.addEventListener('DOMContentLoaded', () => AppEngine.init());
        window.addEventListener('keydown', e => { if((e.ctrlKey || e.metaKey) && e.key === 's'){ e.preventDefault(); AppEngine.salvarAlteracoesPagina(); } });
    </script>
</body>
</html>
